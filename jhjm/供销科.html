<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>供销科朱为民办公室</title>
    
    <!-- 原有风格样式 (保留怀旧视觉) -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "宋体", "SimSun", serif;
        }
        
        body {
            background-color: #c0c0c0;
            color: #000;
            font-size: 16px;
            line-height: 1.5;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            background-color: #008080;
            border: 3px outset #c0c0c0;
            padding: 15px;
            margin: 0 auto;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.3);
        }
        
        .header {
            background-color: #000080;
            color: #fff;
            padding: 10px;
            text-align: center;
            border: 2px inset #c0c0c0;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 24px;
            letter-spacing: 2px;
        }
        
        .office-container {
            background-color: #c0c0c0;
            border: 2px inset #c0c0c0;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .desk {
            background-color: #8b4513;
            border: 5px ridge #654321;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }
        
        .drawer {
            background-color: #a0522d;
            border: 5px ridge #654321;
            padding: 20px;
            width: 300px;
            margin: 0 auto;
        }
        
        .lock-container {
            margin: 15px 0;
        }
        
        .lock-label {
            color: #fff;
            margin-bottom: 10px;
            font-size: 18px;
            text-shadow: 1px 1px 2px #000;
        }
        
        .password-input {
            width: 200px;
            padding: 8px;
            font-size: 20px;
            letter-spacing: 5px;
            text-align: center;
            background-color: #f0f0f0;
            border: 3px inset #c0c0c0;
            margin-bottom: 10px;
        }
        
        .submit-btn {
            background-color: #c0c0c0;
            border: 3px outset #c0c0c0;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .submit-btn:active {
            border: 3px inset #c0c0c0;
        }
        
        .drawer-content {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f0f0;
            border: 2px inset #c0c0c0;
        }
        
        .items-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .item {
            width: 150px;
            padding: 15px;
            background-color: #f0f0f0;
            border: 3px outset #c0c0c0;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .item:hover {
            background-color: #e0e0e0;
            border: 3px inset #c0c0c0;
        }
        
        .item-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .item-title {
            font-weight: bold;
            color: #000080;
        }
        
        .footer {
            text-align: center;
            padding: 10px;
            color: #fff;
            font-size: 14px;
            border-top: 1px dotted #c0c0c0;
            margin-top: 20px;
        }
        
        /* 闪烁效果 */
        .blink {
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.5; }
        }
        
        .error {
            color: #ff0000;
            font-weight: bold;
            margin-top: 10px;
            min-height: 20px;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .container { padding: 10px; }
            .desk { padding: 15px; }
            .drawer { width: 90%; }
            .item { width: 130px; }
        }
        
        @media (max-width: 400px) {
            .header h1 { font-size: 20px; }
            .items-container { flex-direction: column; align-items: center; }
            .item { width: 90%; }
        }
        
        /* 抖动动画 (密码错误) */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake-animation {
            animation: shake 0.5s;
        }
    </style>
    
    <!-- ========== 集成搜索栏资源 (外部文件引用) ========== -->
    <!-- 注：根据要求直接引用已有文件，假设位于相同目录下 -->
    <link rel="stylesheet" href="search-assistant.css">
    <link rel="stylesheet" href="visitor.css">
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>供销科 - 朱为民办公室</h1>
        </div>
        
        <div class="office-container">
            <div class="desk">
                <h2 style="color:#fff; margin-bottom:15px;">办公桌</h2>
                <div class="drawer">
                    <div class="lock-container">
                        <div class="lock-label">办公桌抽屉密码锁</div>
                        <div style="text-align:center;">
                            <!-- 密码框: 新密码 19970312 (8位) 但视觉上保持8位占位 -->
                            <input type="password" class="password-input" id="password" maxlength="8" placeholder="********">
                            <div>
                                <button class="submit-btn" id="unlockBtn">打开抽屉</button>
                            </div>
                        </div>
                        <div class="error" id="errorMsg"></div>
                    </div>
                    
                    <div class="drawer-content" id="drawerContent">
                        <div style="text-align:center; color:#000080; font-weight:bold; margin-bottom:15px;">
                            <span class="blink">抽屉已解锁！</span>
                        </div>
                        <p style="text-align:center; margin-bottom:15px;">发现以下物品：</p>
                        
                        <div class="items-container">
                            <!-- 剪报 - 点击后跳转到 简报.html -->
                            <div class="item" id="newsItem">
                                <div class="item-icon">📰</div>
                                <div class="item-title">水渠纠纷剪报</div>
                                <div style="font-size:12px; margin-top:5px;">点击查看</div>
                            </div>
                            
                            <!-- 磁带 - 点击后跳转到 磁带.html -->
                            <div class="item" id="tapeItem">
                                <div class="item-icon">💿</div>
                                <div class="item-title">旧磁带</div>
                                <div style="font-size:12px; margin-top:5px;">点击查看</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div style="text-align:center; color:#fff; font-size:14px; margin-top:20px;">
                <p>请输入8位动态数字密码打开抽屉（近期两县冲突事件日期）</p>
            </div>
        </div>
        
        <!-- ========== 搜索顶栏区域 (符合外部引用样式) ========== -->
        <!-- 使用已有 common 样式类，并且加载对应js功能。此处仅放置占位结构，功能由外部js实现 -->
        <div class="search-bar-container" style="background:#c0c0c0; padding:8px; border:2px inset; margin-bottom:10px;">
            <!-- 假设搜索引擎模块会在此处渲染或已有占位，但为了保险加上id/class以便引擎绑定 -->
            <div id="search-assistant" class="search-assistant"></div>
        </div>
        
        <div class="footer">
            <p>供销科办公室系统 v1.0 (1997)</p>
            <p>版权所有 © 1997 供销科信息中心</p>
        </div>
    </div>
    
    <!-- 所有弹窗/内部窗口已被移除，用页面跳转替代。 -->
    
    <!-- ========== 脚本区域 ========== -->
    <!-- 原有核心逻辑 (密码验证 + 跳转) 完全重写，移除了弹窗模块 -->
    <script>
        // 更新密码 
        const CORRECT_PASSWORD = "19970312";
        const passwordInput = document.getElementById('password');
        const unlockBtn = document.getElementById('unlockBtn');
        const drawerContent = document.getElementById('drawerContent');
        const errorMsg = document.getElementById('errorMsg');
        
        // 物品元素
        const newsItem = document.getElementById('newsItem');
        const tapeItem = document.getElementById('tapeItem');
        
        // 解锁抽屉
        unlockBtn.addEventListener('click', function() {
            const password = passwordInput.value;
            
            if (password === CORRECT_PASSWORD) {
                drawerContent.style.display = 'block';
                errorMsg.textContent = '';
                passwordInput.disabled = true;
                unlockBtn.disabled = true;
                unlockBtn.textContent = '已解锁';
                unlockBtn.style.opacity = '0.7';
            } else {
                errorMsg.textContent = '密码错误！请重试。';
                // 清空输入框
                passwordInput.value = '';
                // 添加抖动效果
                passwordInput.classList.remove('shake-animation');
                void passwordInput.offsetWidth; // 强制重绘
                passwordInput.classList.add('shake-animation');
            }
        });
        
        // 按Enter键也可以提交密码
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                unlockBtn.click();
            }
        });
        
        // 剪报点击：在新标签页打开简报.html
newsItem.addEventListener('click', function() {
    if (drawerContent.style.display !== 'block') {
        errorMsg.textContent = '请先解锁抽屉！';
        return;
    }
    // 在新标签页打开简报.html
    window.open('./简报.html', '_blank');
});

// 磁带点击：在新标签页打开磁带.html
tapeItem.addEventListener('click', function() {
    if (drawerContent.style.display !== 'block') {
        errorMsg.textContent = '请先解锁抽屉！';
        return;
    }
    // 在新标签页打开磁带.html
    window.open('./磁带.html', '_blank');
});
        
        // 初始提示
        window.addEventListener('load', function() {
            console.log("提示：抽屉密码是朱科长的出生日期 19970312");
            // 确保密码框不禁用（如果之前调试过）
            passwordInput.disabled = false;
            unlockBtn.disabled = false;
            unlockBtn.textContent = '打开抽屉';
            unlockBtn.style.opacity = '1';
        });
    </script>
    
    <!-- 引用外部搜索栏相关js (保持原有文件名，按顺序加载) -->
    <script src="./search-engine.js"></script>
    <script src="./storage.js"></script>
    <script src="./navigation.js"></script>
    <script src="visitor.js"></script>
    <script src="./search-ass.js"></script>
    
    <!-- 附加说明：这些js会利用上面的search-assistant等容器，且不再生成弹窗，完全符合需求。 -->
<script src="return.js"></script>
 <script src="./jinzhi.js"></script>
</body>
</html>
