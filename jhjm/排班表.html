    <script src="search-engine.js"></script>

    <script>
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            
            
            // 初始化内部提醒系统
            initInternalAlert();
            
            // 检查外部JS是否加载失败
            setupExternalJSFailureCheck();
            
            // 获取DOM元素
            const passwordInput = document.getElementById('passwordInput');
            const passwordButton = document.getElementById('passwordButton');
            const passwordError = document.getElementById('passwordError');
            const contentSection = document.getElementById('contentSection');
            const printBtn = document.getElementById('printBtn');
            const lockBtn = document.getElementById('lockBtn');
            const searchButton = document.getElementById('searchButton');
            const searchInput = document.getElementById('searchInput');
            
            // 密码解密逻辑
            // 提示：台球中，8号球是黑色的球，b可能代表black
            // 密码可能是：black8 或 8black
            const zhengquemima = ['210', '102' , '2he10', '10he2', '2+10' ];
            
            // 密码验证
            passwordButton.addEventListener('click', function() {
                const password = passwordInput.value.trim().toLowerCase();
                
                if (zhengquemima.includes(password)) {
                    // 密码正确
                    passwordError.classList.remove('show');
                    
                    // 显示内容区域
                    contentSection.classList.add('show');
                    
                    // 播放解密成功音效
                    playDecryptSuccessSound();
                    
                    // 显示成功提醒
                    showInternalAlert('解密成功', '密码验证通过，正在加载保密内容...');
                    
                    // 记录解密状态到本地存储
                    localStorage.setItem('notebook_decrypted', 'true');
                    
                    // 移除密码输入区域
                    document.querySelector('.password-section').style.display = 'none';
                    
                } else {
                    // 密码错误
                    passwordError.classList.add('show');
                    passwordInput.value = '';
                    passwordInput.focus();
                    
                    // 添加震动效果
                    passwordInput.style.animation = 'shake 0.5s';
                    setTimeout(() => {
                        passwordInput.style.animation = '';
                    }, 500);
                    
                    // 播放错误音效
                    playDecryptErrorSound();
                }
            });
            
            // 回车键提交密码
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    passwordButton.click();
                }
            });
            
            // 打印按钮
            printBtn.addEventListener('click', function() {
                window.print();
            });
            
            // 重新锁定按钮
            lockBtn.addEventListener('click', function() {
                const confirmLock = confirm('确定要重新锁定内容吗？');
                if (confirmLock) {
                    // 隐藏内容
                    contentSection.classList.remove('show');
                    
                    // 显示密码输入区域
                    document.querySelector('.password-section').style.display = 'block';
                    
                    // 清除密码输入
                    passwordInput.value = '';
                    passwordInput.focus();
                    
                    // 清除本地存储
                    localStorage.removeItem('notebook_decrypted');
                    
                    showInternalAlert('已锁定', '内容已重新锁定，需要密码才能再次查看。');
                }
            });
            
            // 搜索按钮点击事件
            searchButton.addEventListener('click', function() {
                handleSearch();
            });
            
            // 搜索框回车事件
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleSearch();
                }
            });
            
            // 处理搜索函数
            function handleSearch() {
                const searchTerm = searchInput.value.trim();
                if (searchTerm !== '') {
                    // 在实际应用中，这里应该调用搜索功能
                    showInternalAlert('搜索功能', `正在搜索: "${searchTerm}"\n搜索功能需要外部JS文件支持。`);
                    searchInput.value = '';
                } else {
                    showInternalAlert('搜索提示', '请输入搜索内容');
                }
            }
            
            // 检查本地存储中是否有解密状态
            if (localStorage.getItem('notebook_decrypted') === 'true') {
                // 自动显示内容
                contentSection.classList.add('show');
                document.querySelector('.password-section').style.display = 'none';
                showInternalAlert('自动验证', '检测到之前的解密状态，已自动加载内容。');
            }
            
            // 模拟解密音效
            function playDecryptSuccessSound() {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(600, audioContext.currentTime + 0.3);
                    oscillator.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 0.6);
                    
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.05, audioContext.currentTime + 0.6);
                    
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.6);
                } catch (e) {
                    console.log('音频上下文不支持');
                }
            }
            
            function playDecryptErrorSound() {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.2);
                    
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                } catch (e) {
                    console.log('音频上下文不支持');
                }
            }
            
            // 初始化内部提醒系统
            function initInternalAlert() {
                const alertButton = document.getElementById('alertButton');
                const alertOverlay = document.getElementById('alertOverlay');
                
                alertButton.addEventListener('click', function() {
                    hideInternalAlert();
                });
                
                alertOverlay.addEventListener('click', function() {
                    hideInternalAlert();
                });
                
                // 监听ESC键关闭提醒
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') {
                        hideInternalAlert();
                    }
                });
            }
            
            // 显示内部提醒
            function showInternalAlert(title, message) {
                document.getElementById('alertTitle').textContent = title;
                document.getElementById('alertContent').textContent = message;
                document.getElementById('internalAlert').style.display = 'block';
                document.getElementById('alertOverlay').style.display = 'block';
                
                // 聚焦到确定按钮
                setTimeout(function() {
                    document.getElementById('alertButton').focus();
                }, 100);
            }
            
            // 隐藏内部提醒
            function hideInternalAlert() {
                document.getElementById('internalAlert').style.display = 'none';
                document.getElementById('alertOverlay').style.display = 'none';
            }
            
            // 检查外部JS是否加载失败
            function setupExternalJSFailureCheck() {
                // 延迟检查外部JS是否成功加载
                setTimeout(function() {
                    // 检查外部search-engine.js是否已加载
                    if (!window.searchEngineLoaded) {
                        console.log('外部JS加载失败，启用本地搜索处理');
                        
                        // 如果外部JS加载失败，显示提示
                        searchButton.addEventListener('click', function() {
                            const searchTerm = searchInput.value.trim();
                            if (searchTerm !== '') {
                                showInternalAlert('搜索功能受限', 
                                    `搜索词: "${searchTerm}"\n外部搜索功能暂时不可用，请检查网络连接或联系管理员。`);
                                searchInput.value = '';
                            }
                        });
                    } else {
                        console.log('外部JS已成功加载');
                    }
                }, 1500); // 延迟1.5秒检查
            }
        });
    </script>
