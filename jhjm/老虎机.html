<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <!-- 关键移动优化：视口设置 + 允许缩放 (保留老式风味但确保可用) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>红星娱乐城·老虎机 暴走版</title>
    <style>
        /* ===== 原始风格保留 & 优化 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Sans MS', 'SimSun', 'VT323', Arial, sans-serif;
            background-color: #000;
            /* 星空背景 — 更细腻 */
            background-image: 
                radial-gradient(white 1px, transparent 1px),
                linear-gradient(#000066, #000028);
            background-size: 50px 50px, 100% 100%;
            color: #fff;
            text-align: center;
            padding: 10px;           /* 手机周围稍小 */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 880px;
            width: 100%;
            margin: 0 auto;
            padding: 15px 10px 20px;   /* 手机适当减少填充 */
            border: 8px solid #ff00ff;
            border-radius: 30px 30px 20px 20px;
            background-color: #0000cc;
            background: radial-gradient(circle at 20% 30%, #1a1aff, #000099);
            box-shadow: 0 0 30px #ff00ff, inset 0 0 40px #0000ff, 0 20px 20px rgba(0,0,0,0.7);
            position: relative;
        }
        
        /* 大红星装饰 (左) */
        .red-star {
            color: #ff0000;
            text-shadow: 0 0 20px #ff6600, 0 0 40px red;
            font-size: 64px;
            position: absolute;
            top: 0px;
            left: 10px;
            animation: starPulse 1.8s infinite;
            z-index: 10;
            filter: drop-shadow(0 0 5px yellow);
        }
        @keyframes starPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(5deg); }
        }
        
        h1 {
            color: #ffff00;
            font-size: 44px;          /* 手机稍小一点但依然霸气 */
            text-shadow: 4px 4px 0 #ff0000, 8px 8px 0 #0000ff, 12px 12px 0 #330033;
            margin-bottom: 5px;
            letter-spacing: 2px;
            font-family: 'SimSun', 'Impact', serif;
            transform: perspective(400px) rotateX(2deg);
        }
        @media (max-width: 600px) {
            h1 { font-size: 36px; }
        }
        
        .site-title {
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 54px;           /* 调小一点 */
            margin-bottom: 5px;
            line-height: 1.2;
        }
        @media (max-width: 600px) {
            .site-title { font-size: 42px; }
        }
        
        .subtitle {
            color: #00ffff;
            font-size: 22px;
            margin-bottom: 15px;
            text-shadow: 3px 3px 0 #ff00ff, 5px 5px 0 #330000;
        }
        
        /* 施工中跑马灯 */
        .under-construction {
            background-color: #ffff00;
            color: #ff0000;
            padding: 12px 10px;
            font-size: 22px;
            font-weight: bold;
            width: 95%;
            margin: 10px auto 20px;
            border: 5px dashed #ff0000;
            border-radius: 30px 5px 30px 5px;
            text-align: center;
            box-shadow: 0 0 25px #ffaa00, inset 0 0 10px orange;
            position: relative;
            transform: rotate(-0.5deg);
        }
        
        .under-construction::before {
            content: "⚡⚡⚡ 暴走中 更容易赢 ⚡⚡⚡";
            font-size: 26px;
            letter-spacing: 4px;
        }
        /* 手机微调 */
        @media (max-width: 500px) {
            .under-construction::before {
                font-size: 20px;
                content: "⚡⚡ 暴走中 ⚡⚡";
            }
        }
        
        /* 优化版老虎机主体 */
        .slot-machine {
            background: linear-gradient(145deg, #b30000, #6f0000);
            border: 12px ridge #ffcc00;
            border-radius: 40px 40px 20px 20px;
            padding: 25px 10px 20px;    /* 手机左右padding减少 */
            margin: 20px auto 25px;
            box-shadow: 0 10px 0 #7f4f00, 0 0 30px #ffaa00, inset 0 0 20px #ffd966;
            position: relative;
        }
        
        .slot-machine::after {
            content: "";
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;  /* 稍微适应 */
            border: 2px dotted #ffcc00;
            border-radius: 30px;
            pointer-events: none;
            opacity: 0.5;
        }
        
        .reels-container {
            display: flex;
            justify-content: center;
            gap: 10px;                  /* 手机间隙缩小 */
            margin-bottom: 20px;
            perspective: 1200px;
            flex-wrap: wrap;             /* 极端小屏允许换行？但保留三列 */
        }
        @media (max-width: 550px) {
            .reels-container {
                gap: 5px;
            }
        }
        
        .reel {
            width: 140px;                /* 稍微缩小适应手机 */
            height: 170px;
            background-color: #0a0a0a;
            border: 6px groove #ffcc00;
            border-radius: 20px 5px 20px 5px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 30px #000, 0 10px 0 #553300, 0 0 20px #ffdd55;
        }
        @media (max-width: 500px) {
            .reel {
                width: 110px;
                height: 140px;
            }
        }
        @media (max-width: 380px) {
            .reel {
                width: 95px;
                height: 120px;
            }
        }
        
        .reel-inner {
            position: absolute;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s cubic-bezier(0.1, 0.7, 0.3, 1);
            will-change: transform;
            top: 0;
            left: 0;
        }
        
        .reel-item {
            width: 100%;
            height: 170px;                /* 匹配reel高度 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;              /* 手机稍小 */
            font-weight: bold;
            color: #FFD966;
            text-shadow: 0 0 15px white, 0 0 30px red;
            background-color: #111;
            border-bottom: 2px solid #ffcc00;
            flex-shrink: 0;
            font-family: 'SimSun', 'Courier New', monospace;
        }
        @media (max-width: 500px) {
            .reel-item {
                font-size: 55px;
                height: 140px;
            }
        }
        @media (max-width: 380px) {
            .reel-item {
                font-size: 48px;
                height: 120px;
            }
        }
        
        /* 控制区 + 拉杆风格 */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;                    /* 手机适当缩小 */
            margin: 25px 0 15px;
            background: rgba(0, 0, 50, 0.6);
            border-radius: 60px;
            padding: 12px 20px;
            border: 3px solid #ffcc00;
            flex-wrap: wrap;               /* 避免太挤换行 */
        }
        
        .spin-button {
            background: linear-gradient(to bottom, #ff4444, #aa0000);
            color: #ffff00;
            border: 6px outset #ffcc00;
            border-radius: 60px 20px 60px 20px;
            padding: 14px 30px;            /* 手机略小 */
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 4px 4px 0 #660000;
            letter-spacing: 4px;
            transition: all 0.1s;
            font-family: 'Comic Sans MS', 'Impact', sans-serif;
            box-shadow: 0 12px 0 #5a2b00, 0 0 20px #ffbb33;
            min-width: 160px;
        }
        @media (max-width: 450px) {
            .spin-button {
                font-size: 26px;
                padding: 12px 20px;
                min-width: 130px;
            }
        }
        
        .spin-button:hover {
            background: linear-gradient(to bottom, #ff6666, #cc0000);
            transform: translateY(-2px);
            box-shadow: 0 14px 0 #5a2b00, 0 0 30px yellow;
        }
        
        .spin-button:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #5a2b00, 0 0 30px yellow;
            border-style: inset;
        }
        
        .spin-button:disabled {
            background: #666;
            border-color: #aaa;
            color: #ccc;
            transform: none;
            box-shadow: 0 8px 0 #333;
            cursor: not-allowed;
        }
        
        .credit-display {
            background: #0a1f2e;
            border: 5px inset #ffcc00;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 36px;
            color: #b3ff66;
            font-family: 'VT323', 'Courier New', monospace;
            text-shadow: 0 0 8px #00ff00;
            box-shadow: inset 0 0 15px #000, 0 6px 0 #3f5c1a;
        }
        @media (max-width: 450px) {
            .credit-display {
                font-size: 30px;
                padding: 6px 12px;
            }
        }
        
        /* 赢家弹窗 —— 保留原始风格但更抢眼, 移动端缩小 */
        .win-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);  /* 稍微缩小适应小屏 */
            background: #ffcc66;
            background: linear-gradient(145deg, #ffdb9f, #cc9933);
            border: 12px double #aa2b2b;
            border-radius: 80px 20px 80px 20px;
            padding: 20px 20px;
            min-width: 300px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 0 8px #ffcc00, 0 30px 40px black, inset 0 0 20px #ffdd99;
            z-index: 200;
            color: #2d150a;
            font-family: 'SimSun', 'Comic Sans MS', cursive;
            border: 6px ridge #ff4444;
        }
        
        .win-popup.hidden {
            display: none;
        }
        
        .popup-header {
            font-size: 32px;              /* 手机缩小 */
            font-weight: bold;
            background: #c92525;
            color: #ffffaa;
            padding: 10px 20px;
            border-radius: 60px 10px 60px 10px;
            margin-top: -50px;
            margin-bottom: 20px;
            border: 5px solid #f3c26b;
            text-shadow: 2px 2px 0 #8b0000;
            font-family: 'Impact', fantasy;
        }
        
        .score-list {
            list-style: none;
            background: #1f541b;
            border: 6px ridge #e5b95c;
            padding: 15px 12px;
            border-radius: 40px 8px 40px 8px;
            color: #fae283;
            font-size: 24px;               /* 适中 */
            font-weight: bold;
            text-shadow: 3px 3px 0 #154215;
            margin-bottom: 20px;
        }
        
        .score-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed #f3c26b;
            padding: 6px 5px;
        }
        
        .score-list li:last-child {
            border: none;
        }
        
        .score-list .name {
            background: #372814;
            padding: 0 15px;
            border-radius: 40px;
            border: 2px solid #dba959;
            font-size: 22px;
        }
        
        .score-list .points {
            background: #000;
            color: #eae65b;
            padding: 4px 16px;
            border-radius: 40px;
            border: 3px solid #f9b81b;
            font-size: 22px;
        }
        
        .close-popup-btn {
            background: #bb3030;
            border: none;
            border-bottom: 8px solid #551a1a;
            color: #f9e281;
            font-size: 28px;
            font-weight: bold;
            padding: 8px 30px;
            border-radius: 80px 10px 80px 10px;
            cursor: pointer;
            font-family: 'VT323', monospace;
            letter-spacing: 3px;
            transition: 0.05s linear;
        }
        
        .close-popup-btn:active {
            border-bottom-width: 2px;
            transform: translateY(6px);
        }
        
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 150;
            backdrop-filter: blur(2px);
        }
        .overlay.hidden { display: none; }
        
        /* 信息条 */
        .stats {
            background: #000066;
            border: 6px double #00ffff;
            border-radius: 30px;
            padding: 12px 10px;
            margin: 20px 0 10px;
            color: #ffff00;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .win-message {
            color: #33ff33;
            font-size: 28px;               /* 手机稍小 */
            font-weight: bold;
            text-shadow: 0 0 20px #00ff00;
            min-height: 50px;
            background: #003300;
            border-radius: 50px;
            padding: 8px 15px;
            border: 3px solid #88ff88;
        }
        @media (max-width: 450px) {
            .win-message {
                font-size: 22px;
            }
        }
        
        .blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%,100%{ opacity:1; } 50%{ opacity:0.2; }
        }
        
        .marquee {
            background-color: #ff00ff;
            color: #ffff00;
            padding: 10px;
            font-size: 20px;
            border: 4px dotted #ffff00;
            overflow: hidden;
            white-space: nowrap;
            border-radius: 40px;
        }
        .marquee span {
            display: inline-block;
            animation: marquee 12s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        
        .footer {
            margin-top: 20px;
            color: #00ffff;
            font-size: 14px;
            border-top: 3px double #ff00ff;
            padding-top: 15px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .web-rings {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .web-ring {
            background: #00f;
            border: 3px solid #ff0;
            padding: 6px 15px;
            border-radius: 30px;
            color: #ff0;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }
        .web-ring:hover {
            background: #f0f;
            color: #fff;
        }
        
        .visitor-counter {
            background: #111;
            border: 3px solid #0f0;
            color: #0f0;
            padding: 6px 15px;
            font-family: 'Courier New', monospace;
            font-size: 22px;
            border-radius: 0;
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .nav-button {
            background: #0000aa;
            color: #ff0;
            border: 4px outset #ffcc00;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 18px;
            cursor: pointer;
        }
        .nav-button:hover {
            background: #4444ff;
        }
        .blinking-cursor {
            animation: cursorBlink 1s infinite;
            font-size: 28px;
        }

        /* 搜索栏相关样式 - 保持原样但添加弹性 */
        .header-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;          /* 手机换行 */
        }

        .logo {
            width: 80px;              /* 手机缩小 */
            height: 80px;
        }
        @media (max-width: 500px) {
            .logo {
                width: 60px;
                height: 60px;
            }
        }

        .search-container {
            flex: 1 1 280px;
            min-width: 240px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background-color: white;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 8px 15px;
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }

        .search-bar:hover {
            box-shadow: 0 1px 8px rgba(32,33,36,0.35);
        }

        .search-bar:focus-within {
            box-shadow: 0 1px 8px rgba(32,33,36,0.45);
        }

        .search-icon {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            color: #9aa0a6;
            flex-shrink: 0;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
            min-width: 120px;
        }

        .search-button {
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            margin-left: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
        }

        .search-button:hover {
            background-color: #2b6fd8;
        }

        /* 基础重置与背景氛围 保留 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #2b3f5c 0%, #1d2c3f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            padding: 0.5rem;
        }

        /* 外层模拟“别的容器” */
        .outer-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 2rem;
            width: 100%;
            max-width: 1100px;
            padding: 1.5rem 1rem;          /* 手机缩小 */
            position: relative;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.5);
        }

        /* 你想要的正上方白色容器 */
        .white-elevated-card {
            background-color: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.35), 0 8px 18px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 880px;
            margin-left: auto;
            margin-right: auto;
            padding: 1.2rem 1rem 1.5rem 1rem;  /* 内部留白适应手机 */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(255,255,255,0.6);
            position: relative;
            top: -8px;
        }

        .white-elevated-card:hover {
            box-shadow: 0 30px 50px -15px black;
            transform: translateY(-10px);
            transition: all 0.25s;
        }

        @media (max-width: 600px) {
            .white-elevated-card {
                padding: 1rem 0.8rem;
            }
        }

        @keyframes cursorBlink {
            0%,100%{ opacity:1; } 50%{ opacity:0; }
        }

        /* 额外手机优化：防止容器溢出 */
        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="outer-container">
        <div class="white-elevated-card">
            <!-- 顶部区域：Logo和搜索栏 (完全原样) -->
            <div class="header-container">
                <img src="search.png" alt="深南市诚信拍卖行" class="logo" onerror="this.style.display='none'"> <!-- 图片不存在时隐藏，不破坏布局 -->
                <div class="search-container">
                    <div class="search-bar">
                        <svg class="search-icon" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
                        </svg>
                        <input type="text" class="search-input" id="searchInput" placeholder="搜索其他关键词...">
                        <button class="search-button" id="searchButton">搜索</button>
                    </div>
                </div>
            </div>
        </div> <!-- 白色卡片结束 -->

        <!-- 老虎机主容器 (完全原样，除class) 注意之前div顺序，现在正确放置 -->
        <div class="container" style="margin-top: 10px;">
            <div class="red-star">★</div>
            <div class="site-title">红星娱乐城</div>
            <h1>☭ 老虎机 ☭</h1>
            <div class="subtitle">· 十次九中 · 信誉保证 ·</div>

            <div class="under-construction"></div>

            <div class="slot-machine">
                <div class="reels-container" id="reelsContainer">
                    <div class="reel" id="reel1"><div class="reel-inner" id="reel1Inner"><div class="reel-item">🍒</div><div class="reel-item">7️⃣</div><div class="reel-item">💎</div><div class="reel-item">🐅</div><div class="reel-item">🍌</div><div class="reel-item">🍇</div><div class="reel-item">🍊</div></div></div>
                    <div class="reel" id="reel2"><div class="reel-inner" id="reel2Inner"><div class="reel-item">🍒</div><div class="reel-item">7️⃣</div><div class="reel-item">💎</div><div class="reel-item">🐅</div><div class="reel-item">🍌</div><div class="reel-item">🍇</div><div class="reel-item">🍊</div></div></div>
                    <div class="reel" id="reel3"><div class="reel-inner" id="reel3Inner"><div class="reel-item">🍒</div><div class="reel-item">7️⃣</div><div class="reel-item">💎</div><div class="reel-item">🐅</div><div class="reel-item">🍌</div><div class="reel-item">🍇</div><div class="reel-item">🍊</div></div></div>
                </div>

                <div class="controls">
                    <div class="credit-display" id="creditDisplay">¥ 100</div>
                    <button class="spin-button" id="spinButton">拉杆</button>
                </div>

                <div class="win-message" id="winMessage">✨ 暴走模式 ✨</div>
            </div>

            <div class="stats">
                <span>🕹️ 在线: 28人</span>
                <span>💰 彩池: ¥388</span>
                <span>🎰 今日爆率: 90%</span>
            </div>

            <div class="marquee"><span>★ 老炮儿 刚刚赢了5000分  ★ 花臂勇 又中大奖 ★ 彪哥 赢得手软 ★ 龅牙陈 请客喝酒 ★</span></div>

            <!-- 弹窗 & 遮罩 -->
            <div class="overlay hidden" id="overlay"></div>
            <div class="win-popup hidden" id="winPopup">
                <div class="popup-header">🎉 满堂红榜单 🎉</div>
                <ul class="score-list" id="scoreList"></ul>
                <div style="display: flex; justify-content: flex-end;">
                    <button class="close-popup-btn" id="closePopup">通杀</button>
                </div>
            </div>

            <div style="margin-top: 8px; font-size:20px; color:#ffb347;">⚡ 最佳观赏 800x600 ⚡</div>
        </div> <!-- container 结束 -->
    </div> <!-- outer-container 结束 -->

    <script>
        (function() {
            // 积分库  
            const gangNames = ["黄毛", "二麻子", "老炮儿", "彪哥", "花臂勇", "赖皮狗", "红中", "龅牙陈"];

            function generateScoreList() {
                const shuffled = [...gangNames].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, 6 + Math.floor(Math.random() * 3));
                return selected.map(name => ({
                    name,
                    points: Math.floor(Math.random() * 2000) + 800
                }));
            }

            function renderPopup(scores) {
                const list = document.getElementById('scoreList');
                list.innerHTML = '';
                scores.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span class="name">${item.name}</span><span class="points">${item.points}</span>`;
                    list.appendChild(li);
                });
            }

            const reelInner1 = document.getElementById('reel1Inner');
            const reelInner2 = document.getElementById('reel2Inner');
            const reelInner3 = document.getElementById('reel3Inner');
            const creditDisplay = document.getElementById('creditDisplay');
            const winMessage = document.getElementById('winMessage');
            const spinBtn = document.getElementById('spinButton');
            const popup = document.getElementById('winPopup');
            const overlay = document.getElementById('overlay');
            const closeBtn = document.getElementById('closePopup');

            let credit = 100;
            const SPIN_COST = 20;

            const symbols = [
                { emoji: '🍒', text: ' ' }, { emoji: '🍒', text: ' ' }, { emoji: '🍒', text: ' ' },
                { emoji: '🐅', text: ' ' }, { emoji: '🐅', text: ' ' }, { emoji: '🐅', text: ' ' },
                { emoji: '🐅', text: ' ' }, { emoji: '🐅', text: ' ' }, 
                { emoji: '🍊', text: ' ' }, { emoji: '🍌', text: ' ' }, { emoji: '🍇', text: ' ' },         
                { emoji: '7️⃣', text: '7' }, { emoji: '7️⃣', text: '7' },
                { emoji: '💎', text: ' ' }, { emoji: '⭐', text: '星' }
            ];

            function setReelContent(reelInner, symbol) {
                const items = reelInner.children; 
                for (let i = 0; i < items.length; i++) {
                    items[i].innerHTML = symbol.emoji;
                }
            }

            function randomSymbol() {
                const r = Math.random();
                if (r < 0.6) return symbols[0];
                else if (r < 0.85) return symbols[11];  // 7️⃣
                else if (r < 0.95) return symbols[13];  // 💎
                else return symbols[14];                 // ⭐
            }

            function isWinning(sym1, sym2, sym3) {
                return sym1.emoji === sym2.emoji && sym2.emoji === sym3.emoji;
            }

            function spin() {
                if (credit < SPIN_COST) {
                    winMessage.innerText = '💰 赊账200! 继续拉';
                    credit += 200;
                    creditDisplay.innerText = `¥ ${credit}`;
                    setTimeout(() => { winMessage.innerText = '✨ 暴走模式 ✨'; }, 1000);
                    return;
                }

                credit -= SPIN_COST;
                creditDisplay.innerText = `¥ ${credit}`;
                spinBtn.disabled = true;

                const r1 = randomSymbol();
                const r2 = randomSymbol();
                const r3 = randomSymbol();

                let steps = 0;
                const maxSteps = 8;
                const interval = setInterval(() => {
                    setReelContent(reelInner1, randomSymbol());
                    setReelContent(reelInner2, randomSymbol());
                    setReelContent(reelInner3, randomSymbol());
                    steps++;
                    if (steps >= maxSteps) {
                        clearInterval(interval);
                        setReelContent(reelInner1, r1);
                        setReelContent(reelInner2, r2);
                        setReelContent(reelInner3, r3);

                        if (isWinning(r1, r2, r3)) {
                            const winBonus = 500 + Math.floor(Math.random() * 1000);
                            credit += winBonus;
                            creditDisplay.innerText = `¥ ${credit}`;
                            winMessage.innerText = `🏆 暴击! +${winBonus}`;
                            const scoreData = generateScoreList();
                            renderPopup(scoreData);
                            popup.classList.remove('hidden');
                            overlay.classList.remove('hidden');
                        } else {
                            if (Math.random() < 0.15) {
                                credit += 100;
                                creditDisplay.innerText = `¥ ${credit}`;
                                winMessage.innerText = '😎 安慰奖 +100';
                            } else {
                                winMessage.innerText = '😄 差点赢 再来!';
                            }
                        }
                        spinBtn.disabled = false;
                    }
                }, 80);
            }

            function closePopup() {
                popup.classList.add('hidden');
                overlay.classList.add('hidden');
            }

            spinBtn.addEventListener('click', spin);
            closeBtn.addEventListener('click', closePopup);
            overlay.addEventListener('click', closePopup);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !spinBtn.disabled && popup.classList.contains('hidden')) {
                    spin();
                } else if (e.key === 'Escape' && !popup.classList.contains('hidden')) {
                    closePopup();
                }
            });

            renderPopup(generateScoreList());
            setReelContent(reelInner1, symbols[0]);
            setReelContent(reelInner2, symbols[1]);
            setReelContent(reelInner3, symbols[2]);
        })();
    </script>
    <!-- 外部JS文件引用 (保持不变) -->
    <script src="./search-engine.js"></script>
    <script src="./storage.js"></script>
    <script src="./navigation.js"></script>
    <script src="./visitor.js"></script>
    <script src="./search-ass.js"></script>
    <script src="./logo-return.js"></script>
</body>

</html>
